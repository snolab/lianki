name: CI

# Mirrors the local git hooks (see DEVELOPMENT.md):
#   - `unit`        ≈ pre-commit fast checks (typecheck + unit + coverage)
#   - `integration` ≈ pre-push `bun run qa:all` (OpenNext build → wrangler dev on
#                      local D1 → API + UI + sync + userscript suites)
on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  unit:
    name: Typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Node ≥ 22.12 is required: the D1 unit suites use node:sqlite, and
      # test:unit runs vitest under Node (not Bun) for that reason. We pin 24
      # (current LTS); see .nvmrc + package.json engines.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests + coverage
        run: bun run test:unit -- --coverage

  integration:
    name: qa:all (D1/Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run inside the official Playwright image: chromium (+ all OS deps) is baked
    # in, so the job never downloads a browser at runtime from cdn.playwright.dev
    # → Google Cloud Storage — an egress path that has stalled for hours on
    # Actions runners while being healthy everywhere else. The image also ships
    # Node 24, satisfying the node:sqlite requirement. Pin the tag to the repo's
    # Playwright version (package.json @playwright/test) so the preinstalled
    # browser build matches what the tests expect.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    # Cloudflare's "always passes" test sitekey, inlined into the build so the
    # Turnstile widget renders without a real key (it gates only the magic-link
    # button; qa:all uses the dev password path). https://developers.cloudflare.com/turnstile/troubleshooting/testing/
    env:
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
    steps:
      - uses: actions/checkout@v4
      # No setup-node: the Playwright image already provides Node 24.
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # No "playwright install" — browsers live in the image at
      # $PLAYWRIGHT_BROWSERS_PATH (/ms-playwright); chromium-1208 matches v1.58.2.
      # Builds the OpenNext Worker, applies migrations to local (Miniflare) D1,
      # boots `wrangler dev` and runs all five suites. No Cloudflare account
      # needed — wrangler runs D1/R2 locally.
      - name: qa:all
        run: bun run qa:all
